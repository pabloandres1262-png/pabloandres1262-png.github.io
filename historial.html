<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Cita | Hospital Ecatepec</title>
    <link rel="stylesheet" href="historial.css".css"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="citas.css"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-block">
                <img src="imagen.png" alt="Logo" class="logo-img">
                <div class="logo-text">
                    <span class="brand-name">Hospital Ecatepec</span>
                </div>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="doctores.html">Directorio Médico</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="container_small">
        <div class="form-container">
            <h2>Expediente Clinico</h2>
            <p>Por favor, complete los datos.</p>

            <form action="#" method="POST" id="citaForm">
                <div class="form-group">
                    <label for="nombre">Nombre Completo del Paciente:</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez">
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com">
                </div>

                <div class="form-group">
                    <label for="especialidad">Especialidad Requerida:</label>
                    <select id="especialidad" name="especialidad" required>
                        <option value="">Seleccione una especialidad</option>
                        <option value="cardiologia">Cardiología</option>
                        <option value="pediatria">Pediatría</option>
                        <option value="medicina-general">Medicina General</option>
                        <option value="odontologia">Odontología</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fecha">Fecha Preferente:</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>

                <div class="form-group">
                    <label for="mensaje">Motivo de la consulta (Opcional):</label>
                    <textarea id="mensaje" name="mensaje" rows="4" placeholder="Breve descripción..."></textarea>
                </div>

                <button type="submit" class="btn-enviar">Guardar Expediente</button>
            </form>
        </div>
    </section>

    <script>
        // Pequeña validación dinámica para mejorar la U/X
        document.getElementById('citaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('¡Gracias! Su informacion a sido enviada con éxito.');
            window.location.href = "proyecto.html";
        });
    </script>
<script src="proyecto.js"></script>
</body>
</html>
