<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Cita | Hospital Ecatepec</title>
    <link rel="stylesheet" href="citas.css"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-block">
                <img src="imagen.png" alt="Logo" class="logo-img">
                <div class="logo-text">
                    <span class="brand-name">Hospital Ecatepec</span>
                </div>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="doctores.html">Directorio Médico</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="container_small" style="max-width: 600px; margin-top: 50px;">
        <h2 style="text-align: center; margin-bottom: 30px;">Agendar Nueva Cita</h2>
        
        <form action="#" method="POST" id="formCitas" class="appointment-form">
            
            <div class="form-group">
                <label>Doctor Seleccionado:</label>
                <input type="text" id="doctorDestino" name="doctor" ; required placeholder="Nombre de su doctor",font-weight: bold;">
            </div>

            <div class="form-group">
                <label for="paciente">Nombre Completo del Paciente:</label>
                <input type="text" id="paciente" name="paciente" required placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-group">
                <label for="fecha">Fecha de la Cita:</label>
                <input type="date" id="fecha" name="fecha" required>
            </div>

            <div class="form-group">
                <label for="horario">Horario Disponible:</label>
                <select id="horario" name="horario" required>
                    <option value="">Seleccione una hora</option>
                    <option value="09:00">09:00 AM</option>
                    <option value="11:00">11:00 AM</option>
                    <option value="16:00">04:00 PM</option>
                    <option value="18:00">06:00 PM</option>
                </select>
            </div>

            <button type="submit" class="btn-primary-form">Confirmar Agendamiento</button>
        </form>
    </section>

    <script>
       
        const urlParams = new URLSearchParams(window.location.search);
        const nombreDoctor = urlParams.get('doc');
        
        if (nombreDoctor) {
            document.getElementById('doctorDestino').value = "Dr(a). " + nombreDoctor;
        }

        document.getElementById('formCitas').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("¡Cita confirmada!.");
            window.location.href = "index.html";
        });
        
    </script>
<script src="citas.js"></script>
</body>
</html>
